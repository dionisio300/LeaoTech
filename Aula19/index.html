<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 12 - Operadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <style>
        .caixa{
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>

</head>

<body style="margin-bottom: 500px;">
    <h1>Aula de Eventos e DOM</h1>
    <div onclick="enviarMsg('unico')" onmouseout="enviarMsg('out')" class="bg-danger text-bg-light caixa ms-1">
        <p>Caixa 1</p>
    </div>

    <div ondblclick="enviarMsg('duplo')" class="bg-success text-bg-light caixa ms-1 mt-1">
        <p>Caixa 2</p>
    </div>

    <div onmouseover="enviarMsg('over')" class="bg-warning text-bg-light caixa ms-1 mt-1">
        <p>Caixa 3</p>
    </div>

    <div class="mt-3 border border-dark p-3 w-75">
        <form action="">
            <label for="nome">Nome:</label>
            <input type="text">
        </form>
    </div>

</body>
<script>

function enviarMsg(tipo){
    if (tipo == 'unico'){
        alert('Click único')
    }else if (tipo == 'duplo'){
        alert('Click dúplo')
    }else if (tipo == 'over'){
        alert('mouse over')
    }else if(tipo == 'out'){
        alert('mouse out')
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
