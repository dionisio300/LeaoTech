<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula03</title>
</head>
<body style="margin-bottom: 500px;">
    <h1>Trabalhando com tabelas</h1>
    <h3>colspan</h3>
    <table id="tabelaDados">
        <tr>
            <th class="cabecalhoTabelas">Nome</th>
            <th class="cabecalhoTabelas">Idade</th>
            <th class="cabecalhoTabelas">Cidade</th>
            
        </tr>
        <tr>
            <td>João</td>
            <td>29</td>
            <td>Frotaleza</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td colspan="2" >28</td>
        </tr>
    </table>
    <br>
    <hr>
    <br>
    <h3>rowspan</h3>
    <table id="tabelaLinguagens">
        <tr>
            <th class="cabecalhoTabelas">Linguagem</th>
            <th class="cabecalhoTabelas">Frameworks</th>
        </tr>
        <tr>
            <td rowspan="2">Python</td>
            <td>Flask</td>
        </tr>
        <tr>
            <!-- <td>Python</td> -->
            <td>FastAPI</td>
        </tr>
        <tr>
            <td rowspan="2">JavaScript</td>
            <td>React</td>
        </tr>
        <tr>
            <!-- <td>JavaScript</td> -->
            <td>Angular</td>
        </tr>
    </table>

    <style>
        table, td, tr, th{
            border: 1px, solid, black;
            border-collapse: collapse;
            padding: 3px;
        }
    </style>

    <h1>Formulários</h1>

    <form>
        <label for="nome"> Nome: </label>
        <input name="nome" placeholder="Ex: João"  id="nome" type="text"> <br><br>

        <label for="senha">Senha:</label>
        <input placeholder="Ex: senha123" type="password" name="senha" id="senha">
        <br><br>

        <label for="email">E-mail</label>
        <input placeholder="Ex: joao@gmail.com"  type="email" name="email" id="email">
        <br><br>

        <label for="idade">Idade: </label>
        <input name="idade" placeholder="Ex: 22"  type="number" step="1" min="0" max="120" id="idade">
        <br><br>

        <h3>Vaga</h3>

        <input name="vaga" id="front" type="radio" value="front">
        <label for="front">Front</label>
        <br>

        <input name="vaga" id="back" type="radio" value="back">
        <label for="back">Back</label>
        <br>

        <input name="vaga" id="qa" type="radio" value="qa">
        <label for="qa">Qualidade</label>
        <br>

        <h3>Linguagens conhecidas</h3>

        <input type="checkbox" name="linguagens" id="python" value="python">
        <label for="python">Python</label><br>

        <input type="checkbox" name="linguagens" id="js" value="js">
        <label for="js">JavaScript</label><br>

        <input type="checkbox" name="linguagens" id="cpp" value="cpp">
        <label for="cpp">C++</label><br><br>

        <label for="comentario">Comentário</label><br>
        
        <textarea name="comentario" id="comentario" rows="5" cols="30" placeholder="Ex: Tenho expleriência em..." maxlength="10" required></textarea>

        <br><br>

        <label for="cidade">Cidade:</label><br>

        <select name="cidade" id="">
            <option value="">--Selecione--</option>
            <option value="fortaleza">Fortaleza</option>
            <option value="caucaia">Caucaia</option>
            <option value="euzebio">Euzebio</option>
        </select>


        <br><br><br>
        <input type="submit" value="Enviar" name="" id="">
    </form>


</body>
</html>
