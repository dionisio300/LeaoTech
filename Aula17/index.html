        function calcularBhaskarah (a,b,c){
            let delta = (b*b)-4*a*c
            if( delta < 0){
                console.log('Não existem raizes rais')
            }
            else if(delta == 0){
                let x = -b/(2*a)
                console.log(`O valor de X é ${x}`)
            }
            else if(delta > 0){
                let x1 = (-b + Math.sqrt(delta))/(2*a)
                let x2 = (-b - Math.sqrt(delta))/(2*a)
                console.log(`X1 = ${x1}\nX2 = ${x2}`)
            }
        }
